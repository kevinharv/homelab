---
- name: Install NGINX
  ansible.builtin.package:
    name: nginx
    state: present

- name: Create Sites Directory
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled
    state: directory

- name: Deploy Site Configurations
  ansible.builtin.template:
    src: site.conf.j2
    dest: "/etc/nginx/sites-enabled/{{ item.name }}.conf"
  loop: "{{ nginx_sites }}"
  notify: reload nginx

- name: Deploy Stream Configuration
  ansible.builtin.template:
    src: streams.conf.j2
    dest: /etc/nginx/conf.d/streams.conf
  notify: reload nginx
  when: nginx_streams | length > 0

- name: Enable NGINX
  ansible.builtin.service:
    name: nginx
    enabled: true
    state: started
